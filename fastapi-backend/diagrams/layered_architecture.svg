<svg xmlns="http://www.w3.org/2000/svg" width="900" height="800" style="background-color: white; font-family: sans-serif; font-size: 14px;">
  <defs>
    <style>
      .layer { stroke: #aaa; stroke-width: 2; stroke-dasharray: 6,4; rx: 10; ry: 10; }
      .layer-title { font-size: 16px; font-weight: bold; fill: #555; }
      
      .component { fill: white; stroke: #555; stroke-width: 2; rx: 6; ry: 6; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1)); }
      .comp-text { fill: #222; text-anchor: middle; font-weight: bold; }
      .comp-sub { fill: #666; text-anchor: middle; font-size: 12px; }

      .arrow { stroke: #777; stroke-width: 3; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#777" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" style="font-size: 20px; font-weight: bold; fill: #333;">System Layered Architecture</text>

  <!-- LAYER 1: Presentation Layer -->
  <rect x="20" y="40" width="860" height="120" class="layer" style="fill: #E8F5E9;" />
  <text x="35" y="65" class="layer-title">Presentation Layer</text>

  <rect x="100" y="80" width="200" height="60" class="component" />
  <text x="200" y="105" class="comp-text">Flutter Mobile App</text>
  <text x="200" y="125" class="comp-sub">(Workers)</text>

  <rect x="350" y="80" width="200" height="60" class="component" />
  <text x="450" y="105" class="comp-text">Web Dashboard</text>
  <text x="450" y="125" class="comp-sub">(Admins)</text>

  <rect x="600" y="80" width="200" height="60" class="component" />
  <text x="700" y="105" class="comp-text">IoT Camera Devices</text>
  <text x="700" y="125" class="comp-sub">(Edge Capture)</text>

  <!-- Arrow -->
  <line x1="450" y1="160" x2="450" y2="190" class="arrow" />

  <!-- LAYER 2: Application / API Layer -->
  <rect x="20" y="190" width="860" height="120" class="layer" style="fill: #E3F2FD;" />
  <text x="35" y="215" class="layer-title">Application / API Layer</text>

  <rect x="100" y="230" width="200" height="60" class="component" />
  <text x="200" y="255" class="comp-text">FastAPI Routers</text>
  <text x="200" y="275" class="comp-sub">(REST &amp; WebSockets)</text>

  <rect x="350" y="230" width="200" height="60" class="component" />
  <text x="450" y="255" class="comp-text">Auth &amp; Middleware</text>
  <text x="450" y="275" class="comp-sub">(Security)</text>

  <rect x="600" y="230" width="200" height="60" class="component" />
  <text x="700" y="255" class="comp-text">Background Tasks</text>
  <text x="700" y="275" class="comp-sub">(Async Queue)</text>

  <!-- Arrow -->
  <line x1="450" y1="310" x2="450" y2="340" class="arrow" />

  <!-- LAYER 3: Business Logic Layer -->
  <rect x="20" y="340" width="860" height="120" class="layer" style="fill: #FFF3E0;" />
  <text x="35" y="365" class="layer-title">Business Logic Layer</text>

  <rect x="48" y="380" width="180" height="60" class="component" />
  <text x="138" y="405" class="comp-text">YOLO Inference</text>
  <text x="138" y="425" class="comp-sub">&amp; Defect Detection</text>

  <rect x="256" y="380" width="180" height="60" class="component" />
  <text x="346" y="405" class="comp-text">AI Supervisor Agent</text>
  <text x="346" y="425" class="comp-sub">(LangChain)</text>

  <rect x="464" y="380" width="180" height="60" class="component" />
  <text x="554" y="405" class="comp-text">Auto-Retraining</text>
  <text x="554" y="425" class="comp-sub">Engine</text>

  <rect x="672" y="380" width="180" height="60" class="component" />
  <text x="762" y="405" class="comp-text">Dataset Versioning</text>
  <text x="762" y="425" class="comp-sub">Service</text>

  <!-- Arrow -->
  <line x1="450" y1="460" x2="450" y2="490" class="arrow" />

  <!-- LAYER 4: Data Access Layer -->
  <rect x="20" y="490" width="860" height="120" class="layer" style="fill: #F3E5F5;" />
  <text x="35" y="515" class="layer-title">Data Access Layer</text>

  <rect x="200" y="530" width="200" height="60" class="component" />
  <text x="300" y="555" class="comp-text">SQLAlchemy ORM</text>
  <text x="300" y="575" class="comp-sub">(Models &amp; Queries)</text>

  <rect x="500" y="530" width="200" height="60" class="component" />
  <text x="600" y="555" class="comp-text">File System Handlers</text>
  <text x="600" y="575" class="comp-sub">(Pathlib &amp; I/O)</text>

  <!-- Arrow -->
  <line x1="450" y1="610" x2="450" y2="640" class="arrow" />

  <!-- LAYER 5: Infrastructure & Storage Layer -->
  <rect x="20" y="640" width="860" height="120" class="layer" style="fill: #ECEFF1;" />
  <text x="35" y="665" class="layer-title">Infrastructure &amp; Storage Layer</text>

  <rect x="200" y="680" width="200" height="60" class="component" />
  <text x="300" y="705" class="comp-text">Relational Database</text>
  <text x="300" y="725" class="comp-sub">(SQLite / PostgreSQL)</text>

  <rect x="500" y="680" width="200" height="60" class="component" />
  <text x="600" y="705" class="comp-text">Local File Storage</text>
  <text x="600" y="725" class="comp-sub">(Images &amp; AI Weights)</text>

</svg>
