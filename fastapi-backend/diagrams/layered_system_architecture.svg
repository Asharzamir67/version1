<svg xmlns="http://www.w3.org/2000/svg" width="900" height="800" style="background-color: white; font-family: sans-serif; font-size: 14px;">
  <defs>
    <style>
      .layer { stroke: #aaa; stroke-width: 2; stroke-dasharray: 6,4; rx: 10; ry: 10; }
      .layer-title { font-size: 16px; font-weight: bold; fill: #555; }
      
      .component { fill: white; stroke: #555; stroke-width: 2; rx: 6; ry: 6; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1)); }
      .comp-text { fill: #222; text-anchor: middle; font-weight: bold; }
      .comp-sub { fill: #666; text-anchor: middle; font-size: 12px; }

      .arrow { stroke: #777; stroke-width: 3; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#777" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" style="font-size: 20px; font-weight: bold; fill: #333;">Detailed Layered System Architecture</text>

  <!-- LAYER 1: Presentation Layer -->
  <rect x="20" y="40" width="860" height="120" class="layer" style="fill: #E8F5E9;" />
  <text x="35" y="65" class="layer-title">Presentation Layer</text>

  <rect x="100" y="80" width="200" height="60" class="component" />
  <text x="200" y="105" class="comp-text">Desktop App</text>
  <text x="200" y="125" class="comp-sub">(Worker Interface)</text>

  <rect x="350" y="80" width="200" height="60" class="component" />
  <text x="450" y="105" class="comp-text">Web Dashboard</text>
  <text x="450" y="125" class="comp-sub">(Admin Interface)</text>

  <rect x="600" y="80" width="200" height="60" class="component" />
  <text x="700" y="105" class="comp-text">IoT Camera Devices</text>
  <text x="700" y="125" class="comp-sub">(Edge Image Capture)</text>

  <!-- Arrow -->
  <line x1="450" y1="160" x2="450" y2="190" class="arrow" />

  <!-- LAYER 2: Application Layer -->
  <rect x="20" y="190" width="860" height="120" class="layer" style="fill: #E3F2FD;" />
  <text x="35" y="215" class="layer-title">Application Layer</text>

  <rect x="100" y="230" width="200" height="60" class="component" />
  <text x="200" y="255" class="comp-text">FastAPI Routers</text>
  <text x="200" y="275" class="comp-sub">(REST &amp; WebSockets)</text>

  <rect x="350" y="230" width="200" height="60" class="component" />
  <text x="450" y="255" class="comp-text">Auth &amp; Middleware</text>
  <text x="450" y="275" class="comp-sub">(Security &amp; JWT)</text>

  <rect x="600" y="230" width="200" height="60" class="component" />
  <text x="700" y="255" class="comp-text">Background Tasks</text>
  <text x="700" y="275" class="comp-sub">(Async Operations)</text>

  <!-- Arrow -->
  <line x1="450" y1="310" x2="450" y2="340" class="arrow" />

  <!-- LAYER 3: Agentic Layer -->
  <rect x="20" y="340" width="860" height="120" class="layer" style="fill: #F3E5F5;" />
  <text x="35" y="365" class="layer-title">Agentic Layer</text>

  <rect x="100" y="380" width="200" height="60" class="component" />
  <text x="200" y="405" class="comp-text">AI Supervisor</text>
  <text x="200" y="425" class="comp-sub">(LangChain Agent)</text>

  <rect x="350" y="380" width="200" height="60" class="component" />
  <text x="450" y="405" class="comp-text">Diagnostic Tools</text>
  <text x="450" y="425" class="comp-sub">(System Stats &amp; RCA)</text>

  <rect x="600" y="380" width="200" height="60" class="component" />
  <text x="700" y="405" class="comp-text">Auto-Retraining Trigger</text>
  <text x="700" y="425" class="comp-sub">(Automated Pipeline)</text>

  <!-- Arrow -->
  <line x1="450" y1="460" x2="450" y2="490" class="arrow" />

  <!-- LAYER 4: Inference Layer -->
  <rect x="20" y="490" width="860" height="120" class="layer" style="fill: #FFF3E0;" />
  <text x="35" y="515" class="layer-title">Inference Layer</text>

  <rect x="100" y="530" width="200" height="60" class="component" />
  <text x="200" y="555" class="comp-text">YOLO Engine</text>
  <text x="200" y="575" class="comp-sub">(Threaded Object Detection)</text>

  <rect x="350" y="530" width="200" height="60" class="component" />
  <text x="450" y="555" class="comp-text">Defect Detection</text>
  <text x="450" y="575" class="comp-sub">(Status: OK / NotGood)</text>

  <rect x="600" y="530" width="200" height="60" class="component" />
  <text x="700" y="555" class="comp-text">JPEG Renderer</text>
  <text x="700" y="575" class="comp-sub">(Bounding Boxes Output)</text>

  <!-- Arrow -->
  <line x1="450" y1="610" x2="450" y2="640" class="arrow" />

  <!-- LAYER 5: Data Layer -->
  <rect x="20" y="640" width="860" height="120" class="layer" style="fill: #ECEFF1;" />
  <text x="35" y="665" class="layer-title">Data Layer</text>

  <rect x="100" y="680" width="200" height="60" class="component" />
  <text x="200" y="705" class="comp-text">Relational Database</text>
  <text x="200" y="725" class="comp-sub">(PostgreSQL / SQLite)</text>

  <rect x="350" y="680" width="200" height="60" class="component" />
  <text x="450" y="705" class="comp-text">Local File Storage</text>
  <text x="450" y="725" class="comp-sub">(Saved Images &amp; Datasets)</text>

  <rect x="600" y="680" width="200" height="60" class="component" />
  <text x="700" y="705" class="comp-text">Dataset Versioning</text>
  <text x="700" y="725" class="comp-sub">(Snapshots / Models Registry)</text>

</svg>
